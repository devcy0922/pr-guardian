services:
  pr-guardian:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pr-guardian
    ports:
      - "3002:3000"
    environment:
      - PORT=3000
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:?GITHUB_WEBHOOK_SECRETлҘј м„Өм •н•ҳм„ёмҡ”}
      - GITHUB_TOKEN=${GITHUB_TOKEN:?GITHUB_TOKENмқ„ м„Өм •н•ҳм„ёмҡ”}
      - LLM_GATEWAY_URL=${LLM_GATEWAY_URL}
      - LLM_MODEL=${LLM_MODEL:-qwen3-8b}
      - LLM_API_KEY=${LLM_API_KEY:?LLM_API_KEYлҘј м„Өм •н•ҳм„ёмҡ”}
      - LOG_LEVEL=info
      - JIRA_BASE_URL=${JIRA_BASE_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - AUTO_PM_ENABLED=${AUTO_PM_ENABLED:-true}
      - AUTO_PM_PROJECT_NUMBER=${AUTO_PM_PROJECT_NUMBER:-1}
      - AUTO_PM_CREATE_MILESTONE=${AUTO_PM_CREATE_MILESTONE:-false}
      - SENSITIVE_HOSTNAMES=${SENSITIVE_HOSTNAMES}
    restart: unless-stopped
    networks:
      - shared_ai_net

networks:
  shared_ai_net:
    name: shared_ai_net
    external: true
