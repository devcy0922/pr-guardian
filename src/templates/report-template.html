<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Guardian Review Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0d1117;
      --card-bg: #161b22;
      --text-color: #c9d1d9;
      --text-bright: #f0f6fc;
      --primary: #58a6ff;
      --border-color: #30363d;
      --success: #2ea44f;
      --warning: #d29922;
      --danger: #f85149;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    h1, h2, h3 {
      color: var(--text-bright);
      margin-top: 0;
    }

    h1 {
      font-size: 28px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .summary-section {
      background: rgba(88, 166, 255, 0.1);
      border-left: 4px solid var(--primary);
      padding: 20px;
      border-radius: 6px;
      margin-bottom: 30px;
    }

    .summary-title {
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }

    th, td {
      border: 1px solid var(--border-color);
      padding: 12px 16px;
      text-align: left;
    }

    th {
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--text-bright);
    }

    tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.02);
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-pass { background-color: rgba(46, 164, 79, 0.2); color: #56d364; }
    .badge-warn { background-color: rgba(210, 153, 34, 0.2); color: #e3b341; }
    .badge-fail { background-color: rgba(248, 81, 73, 0.2); color: #ff7b72; }
    .badge-info { background-color: rgba(88, 166, 255, 0.2); color: #79c0ff; }

    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
      font-size: 12px;
      color: #8b949e;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ PR Guardian Review Report</h1>
    
    <div class="summary-section">
      <div class="summary-title">📝 작업 요약</div>
      <div id="summary-content"><!-- SUMMARY_CONTENT --></div>
    </div>

    <h2>📊 체크리스트</h2>
    <div id="checklist-table"><!-- CHECKLIST_TABLE --></div>

    <h2>📁 수정 파일 분류</h2>
    <div id="file-table"><!-- FILE_TABLE --></div>

    <footer>
      <span>🤖 Powered by PR Guardian & GoVail Gateway</span>
      <span id="meta-info"><!-- META_INFO --></span>
    </footer>
  </div>
</body>
</html>
